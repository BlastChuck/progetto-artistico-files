<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archivio Database Artistico</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="header-title">
        <h1>📚 Norbi Archive</h1>
        <p>Visualizza e gestisci tutti i dati del patrimonio in un'unica interfaccia</p>
      </div>
      <button id="reset-button" class="button button--secondary">Reimposta dati</button>
    </div>
  </header>

  <main class="container">
    <!-- Breadcrumb di navigazione -->
    <nav class="breadcrumb" id="breadcrumb"></nav>

    <!-- Barra di ricerca e filtri -->
    <div class="search-panel">
      <div class="search-box">
        <input 
          type="text" 
          id="search-input" 
          placeholder="Cerca studenti, opere, prestiti, mostre, feedback..." 
          class="search-input"
        />
        <button id="search-btn" class="button button--primary">Cerca</button>
      </div>
      
      <div class="filters">
        <select id="filter-type" class="filter-select">
          <option value="">Tutti i tipi</option>
          <option value="students">Studenti</option>
          <option value="artworks">Opere</option>
          <option value="loans">Prestiti</option>
          <option value="exhibitions">Mostre</option>
          <option value="feedback">Feedback</option>
        </select>
      </div>
    </div>

    <!-- Pulsanti categorie -->
    <div class="category-buttons">
      <button class="category-btn active" data-category="">Tutto</button>
      <button class="category-btn" data-category="students">👤 Studenti</button>
      <button class="category-btn" data-category="artworks">🎨 Opere</button>
      <button class="category-btn" data-category="loans">📦 Prestiti</button>
      <button class="category-btn" data-category="exhibitions">🎭 Mostre</button>
      <button class="category-btn" data-category="feedback">⭐ Feedback</button>
    </div>

    <!-- Statistiche rapide -->
    <div class="stats-bar" id="stats-bar"></div>

    <!-- Area principale con vista split -->
    <div class="main-area">
      <!-- Pannello sinistro: lista risultati / dati principali -->
      <section class="left-panel">
        <div class="panel-header">
          <h2 id="panel-title">Archivio</h2>
          <button id="add-item-btn" class="button button--primary">+ Aggiungi</button>
        </div>
        <div class="items-list" id="items-list"></div>
      </section>

      <!-- Pannello destro: dettagli e relazioni -->
      <section class="right-panel">
        <div id="details-panel" class="details-panel"></div>
      </section>
    </div>
  </main>

  <!-- Modal per form CRUD -->
  <div class="modal hidden" id="record-modal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 id="modal-title">Nuovo record</h2>
        <button id="close-modal" class="icon-button" aria-label="Chiudi">×</button>
      </div>
      <form id="record-form" class="record-form">
        <div id="form-fields"></div>
        <div class="modal-actions">
          <button type="button" class="button button--secondary" id="cancel-button">Annulla</button>
          <button type="button" class="button button--primary" id="save-button">Salva</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
